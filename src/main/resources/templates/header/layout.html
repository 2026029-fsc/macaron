<!DOCTYPE html>
<html smlns:th="http://www.thymeleaf.org">

<header th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="site-header">
    <!-- 共通部分 -->
    <p>土壇場チャンスセール</p>
    <a class="site-name" href="/"><h1>ドタチャン</h1></a>

    <p>博多の飲食店・小売店・店舗・セール情報</p>
    <nav class="header-button">
    <!-- 未ログインの場合 -->
        <button th:if="${session.username == null && session.userEmail == null}" class="button"
            onclick="location.href='/register'">会員登録</button>
        <button th:if="${session.username == null && session.userEmail == null}" class="button"
            onclick="location.href='/storeLogin'">店舗ログイン</button>
        <button th:if="${session.username == null && session.userEmail == null}" class="button"
            onclick="location.href='/userLogin'">一般ユーザーログイン</button>

    <!-- 一般ユーザーでログインしている場合 -->
        <button th:if="${session.userEmail != null}" class="button" onclick="location.href='/mypage'">マイページ</button>
        <button th:if="${session.userEmail != null}" class="button" onclick="location.href='/home'">ログアウト</button>

    <!-- 店舗ユーザーでログインしている場合 -->
        <button th:if="${session.storeEmail != null}" class="button" onclick="location.href='/saleEdit'">突発セール編集</button>
        <button th:if="${session.storeEmail != null}" class="button"
            onclick="location.href='/mystore'">マイページ・クーポン編集</button>
        <button th:if="${session.storeEmail != null}" class="button" onclick="location.href='/home'">ログアウト</button>
    </nav>

    <hr>
</header>

<body>
</body>

</html>
