<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{header/layout :: head('土壇場でキャンセルが来ても安心！ドタチャン！')}">
    <link rel="stylesheet" href="../../static/css/style.css">
</head>

<body class="storeDetail">

  <div class="main-container">
    
    <div class="left-content">
      
      <div class="store-header">
        <h2><span th:text="${Store.name}" class="storeName">店舗名</span></h2>
        <p class="store-sub">ジャンル：<span th:text="${Store.genre}"></span> ｜ 住所：<span th:text="${Store.address}"></span></p>
      </div>

      <div class="sale-section">
        <h2>突発セール</h2>
        <div th:if="${#lists.isEmpty(SuddenSales)}" class="sale-card">
          <p>現在突発セールは開催されていません</p>
        </div>
        <div th:each="SuddenSale : ${SuddenSales}" class="sale-card sudden-sale">
          <h3 th:text="${SuddenSale.name}" class="salename">セール名</h3>
          <p th:text="${SuddenSale.contents}" class="saletext">セール内容</p>
        </div>
      </div>

      <div class="sale-section">
        <h2>恒常セール</h2>
        <div th:each="Sale : ${Sales}" class="sale-card regular-sale">
          <h3 th:text="${Sale.name}" class="salename">セール名</h3>
          <p th:text="${Sale.contents}" class="saletext">セール内容</p>
        </div>
      </div>

      <div class="info-columns">
        
        <div class="info-box-left">
          <h3>店舗情報</h3>
          <table class="store_info_table">
            <tr>
              <td class="label">電話番号：</td>
              <td><a th:href="@{|tel:0${Store.phone_number}|}" th:text="|0${Store.phone_number}|"></a></td>
            </tr>
            <tr>
              <td class="label">決済方法：</td>
              <td><p th:text="${Store.payment}"></p></td>
            </tr>
            <tr>
              <td class="label">ジャンル：</td>
              <td><p th:text="${Store.genre}"></p></td>
            </tr>
            <tr>
              <td class="label">お店からのコメント：</td>
              <td>
                <p th:if="${#strings.isEmpty(Store.free_desc)}">このお店はコメントを登録していません</p>
                <p th:text="${Store.free_desc}"></p>
              </td>
            </tr>
          </table>
        </div>

        <div class="info-box-right">
          <h3>お得なクーポン</h3>
          
          <div th:if="${user == null}" class="coupon-notice">
            <p>ログインしてレビューを書いたら、クーポンゲット！</p>
          </div>

          <div th:if="${user != null}">
            <div th:unless="${user.reviewed}" class="coupon-notice">
              <p>レビューを書いたら、クーポンゲット！</p>
            </div>

            <div th:if="${user.reviewed}" class="coupon-card">
              <p th:if="${#strings.isEmpty(Store.coupon)}">このお店は使用可能なクーポンを掲載していません</p>
              <p th:unless="${#strings.isEmpty(Store.coupon)}" th:text="${Store.coupon}"></p>
            </div>
          </div>
        </div>
        
      </div>

      <div class="review_box">
        <h2>口コミ</h2>

        <div th:if="${user == null}" class="review-login-notice">
          <p>ログインするとレビューが書けるようになります！</p>
        </div>

        <div th:if="${user != null}" class="review_post">
          <fieldset>
            <legend>あなたの評価：</legend>
            <form th:action="@{/store_detail/{id}(id=${Store.id})}" method="post">
              <div class="radio-group">
                <input type="radio" id="huey" name="evaluation" value="true" checked />
                <label for="huey">👍</label>
                <input type="radio" id="louie" name="evaluation" value="false" />
                <label for="louie">👎</label>
              </div>
              <p><textarea placeholder="このお店はいかがでしたか？" name="comments" class="reviewarea"></textarea></p>
              <button type="submit" class="blogbutton">投稿!</button>
            </form>
          </fieldset>
        </div>

        <div th:each="review : ${Review}" class="review-item">
          <fieldset>
            <p class="review-user" th:text="${review.name}">投稿者名</p>
            <p class="review-eval" th:if="${review.evaluation==true}">👍</p>
            <p class="review-eval" th:if="${review.evaluation==false}">👎</p>
            <p class="review-comment" th:text="${review.comments}">コメント</p>
          </fieldset>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
