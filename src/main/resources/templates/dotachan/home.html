<!DOCTYPE html>
<html lang="ja">

<head th:replace="~{header/layout :: head('土壇場でキャンセルが来ても安心！ドタチャン！')}">
    <link rel="stylesheet" href="../../static/css/style.css">
</head>

<!-- homeクラスを追加 -->

<body class="home">
    <div class="layout">
        <div class="left">

            <h2>突発セール情報</h2>
            <hr>
            <div class="scroll-area">
                <p th:if="${#lists.isEmpty(SuddenSale)}"> 現在突発的なセールは開催されていません</p>
                <table>
                    <tr>
                        <th>SuddenSale Name</th>
                    </tr>
                    <tr th:each="SuddenSale : ${SuddenSale}" class="sale">
                        <td><a class="salename" th:href="@{/store_detail/{id}(id=${SuddenSale.id})}"
                                th:text="${SuddenSale.name}">現在セールは開催されていません</a></td>
                        <td><a class="saletext" th:href="@{/store_detail/{id}(id=${SuddenSale.id})}"
                                th:text="${SuddenSale.contents}">noname</a></td>
                    </tr>
                </table>
            </div>

            <!-- キーワード検索 -->
            <div class="search">
                <form action="/keywordSerch" method="get">
                    <input type="text" id="keyword" name="keyword" placeholder="キーワード検索">
                    <button class="button" type="submit">検索</button>
                </form>

                <!-- ジャンル検索 -->
                <form action="/genreSerch" method="get">
                    <select name="genreSerch" id="genreSerch">
                        <option value="">選択してください</option>
                        <option value="カフェ">カフェ</option>
                        <option value="居酒屋">居酒屋</option>
                        <option value="ラーメン">ラーメン</option>
                        <option value="イタリアン">イタリアン</option>
                        <option value="カレー">カレー</option>
                        <option value="野菜">野菜</option>
                        <option value="ステーキ">ステーキ</option>
                    </select>
                    <button class="button" type="submit">検索</button>
                </form>
            </div>


            <h2>恒常セール情報</h2>
            <hr>
            <div class="scroll-area">
            <p th:if="${#lists.isEmpty(Sale)}"> 現在セールは開催されていません</p>
            <table>
                <tr>
                    <th>Sale Name</th>
                </tr>
                <tr th:each="Sale : ${Sale}" class="sale">
                    <td><a class="salename" th:href="@{/store_detail/{id}(id=${Sale.id})}"
                            th:text="${Sale.name}">現在セールは開催されていません</a></td>
                    <td><a class="saletext" th:href="@{/store_detail/{id}(id=${Sale.id})}"
                            th:text="${Sale.contents}">noname</a></td>
                </tr>
            </table>
        </div>
    </div>

    </div>
</body>

</html>
