<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<!-- <head th:place="~{fragments/layout1::head('無料会員登録')}"> -->
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無料会員登録(個人)</title>
</head>
<body>
    <p>利用者の登録</p>
    <!-- <p th:if="${errorMessage}" th:text="${errorMessage}"></p> -->

    <form action="@{/correct}" th:object="${form}" method="post" >
        <p>ユーザーネームを入力してください。</p>
        <input type="text" th:field="*{name}" id="name" name="name" placeholder="ユーザーネーム">
        <span th:errors="*{name}" style="color: red;"></span>
        
        <p>メールアドレスを入力してください。</p>
        <input type="text" th:field="*{mail}" id="mail" name="mail" placeholder="メールアドレス">
         <span th:errors="*{mail}" style="color: red;"></span>
         <!-- <input type="email" th:field="${registerForm.email}" required class="form-control">  -->
        
         <p>パスワードを入力してください。</p>
        <input type="password" th:field="*{password}" id="password" name="password" placeholder="パスワード">
        <span th:errors="*{password}" style="color: red;"></span>

        <p>パスワードを入力してください。(確認用)</p>
        <input type="password" th:field="*{password2}"id="password2" name="password2" placeholder="パスワード"><br>
        <span th:errors="*{password2}" style="color: red;"></span>
        <button type="submit">登録</button>
    </form>

    <p>店舗会員の登録</p>
    <a href="/subscribe">店舗サブスクの詳細はこちら</a>
    <p>店舗管理の登録</p>
    <p>0120-xxxx-xxxxまで</p>
</body>
</html>
