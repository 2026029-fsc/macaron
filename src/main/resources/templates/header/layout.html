<!DOCTYPE html>
<html smlns:th="http://www.thymeleaf.org">

<header th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">

    <!-- 共通部分 -->
    <title th:text="${title}">タイトル</title>
    <p>土壇場チャンスセール</p>
    <h2>ドタチャン</h2>
    <p>博多の飲食店・小売店・店舗・セール情報</p>

    <!-- 未ログインの場合 -->
    <button th:if="${session.username == null && session.userEmail == null}" class="button"
        onclick="location.href='/touroku'">会員登録</button>
    <button th:if="${session.username == null && session.userEmail == null}" class="button"
        onclick="location.href='/tempologin'">店舗ログイン</button>
    <button th:if="${session.username == null && session.userEmail == null}" class="button"
        onclick="location.href='/ippanlogin'">一般ユーザーログイン</button>

    <!-- 一般ユーザーでログインしている場合 -->
    <button th:if="${session.userEmail != null}" class="button" onclick="location.href='/mypage'">マイページ</button>
    <button th:if="${session.userEmail != null}" class="button" onclick="location.href='/logout'">ログアウト</button>

    <!-- 店舗ユーザーでログインしている場合 -->
    <button th:if="${session.storeEmail != null}" class="button" onclick="location.href='/toppatu'">突発セール編集</button>
    <button th:if="${session.storeEmail != null}" class="button"
        onclick="location.href='/mypage_coupon'">マイページ・クーポン編集</button>
    <button th:if="${session.storeEmail != null}" class="button" onclick="location.href='/logout'">ログアウト</button>

</header>

<body>
</body>

</html>
