<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<!-- <head th:place="~{fragments/layout1::head('無料会員登録')}"> -->
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無料会員登録(個人)</title>
</head>
<body>
    <p>利用者の登録</p>
    <form action="/correct" method="post">
        <p>ユーザーネームを入力してください。</p>
        <input type="text" id="name" name="name" placeholder="ユーザーネーム">
        <p>メールアドレスを入力してください。</p>
        <input type="text" id="mail" name="mail" placeholder="メールアドレス">
        <p>パスワードを入力してください。</p>
        <input type="password" id="password" name="password" placeholder="パスワード">
        <p>パスワードを入力してください。(確認用)</p>
        <input type="password" id="password2" name="password2" placeholder="パスワード"><br>
        <button type="submit">登録</button>
    </form>

    <!--今岡追加  -->
    <!-- パスワード不一致 -->
    <p th:if="${passError}" th:text="${passError}"></p>
   
   <p>下記に記載のプライバシーポリシー・規約に同意のうえ以下の「ログイン」を押してください。</p>
    <button type="submit">ログイン</button>
  </form>

    <ul>
      <li><a href="/privacy-policy">プライバシーポリシー</a></li>
      <li><a href="/argreement">規約</a></li>
    </ul>
  </div>
    <!--今岡追加ここまで  -->
    
    <p>店舗会員の登録</p>
    <a href="/subscribe">店舗サブスクの詳細はこちら</a>
    <p>店舗管理の登録</p>
    <p>0120-xxxx-xxxxまで</p>
</body>
</html>
